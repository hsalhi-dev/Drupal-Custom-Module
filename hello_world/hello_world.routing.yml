hello_world.content:
  path: '/hello'
  defaults:
    _controller: '\Drupal\hello_world\Controller\HelloController::content'
    _title: 'Hello World'
  requirements:
    _permission: 'access content'

hello_world.contact_form:
  path: '/hello/contact'
  defaults:
    _form: '\Drupal\hello_world\Form\ContactRequestForm'
    _title: 'Contact request form'
  requirements:
    _permission: 'access content'